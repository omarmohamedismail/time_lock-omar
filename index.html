<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Countdown Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #0a0a0f;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace;
    }
    .timer-wrap {
      min-height: 520px; background: #0a0a0f;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 2rem; position: relative; overflow: hidden;
    }
    .timer-wrap::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(83,74,183,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .setup-panel {
      display: flex; flex-direction: column; align-items: center;
      gap: 1.5rem; width: 100%; max-width: 420px; position: relative; z-index: 1;
    }
    .panel-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 28px;
      letter-spacing: 4px; color: #a89fe8;
    }
    .input-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .input-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .input-group label {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: #7772a8;
    }
    .time-input {
      width: 80px; text-align: center;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(168,159,232,0.3);
      color: #e8e4ff; border-radius: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px; padding: 10px 6px; outline: none;
      transition: border-color 0.2s;
    }
    .time-input:focus { border-color: rgba(168,159,232,0.7); }
    .color-row { display: flex; align-items: center; gap: 10px; }
    .color-row label {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: #7772a8;
    }
    input[type="color"] {
      width: 44px; height: 32px;
      border: 0.5px solid rgba(168,159,232,0.3);
      border-radius: 8px; cursor: pointer; background: none; padding: 2px;
    }
    .start-btn {
      font-family: 'Bebas Neue', sans-serif; font-size: 20px;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #534ab7, #7f77dd);
      color: #fff; border: none; border-radius: 8px;
      padding: 12px 48px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .start-btn:hover { opacity: 0.85; }
    .start-btn:active { transform: scale(0.97); }
    .err-msg { color: #f09595; font-size: 12px; letter-spacing: 1px; display: none; }
    .clock-panel {
      display: none; flex-direction: column;
      align-items: center; gap: 1rem; position: relative; z-index: 1;
    }
    .time-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 18vw, 160px);
      letter-spacing: 6px; line-height: 1; color: #ffffff;
      text-shadow: 0 0 40px rgba(127,119,221,0.5);
    }
    .time-display .sep { color: #534ab7; }
    .clock-label {
      font-size: 11px; letter-spacing: 4px;
      text-transform: uppercase; color: #7772a8; margin-top: -8px;
    }
    .done-text {
      font-family: 'Bebas Neue', sans-serif; font-size: 32px;
      letter-spacing: 6px; color: #5dcaa5; display: none;
    }
  </style>
</head>
<body>
  <div class="timer-wrap" id="root">
    <div class="setup-panel" id="setup">
      <div class="panel-title">Set Countdown</div>
      <div class="input-row">
        <div class="input-group">
          <label>Hours</label>
          <input class="time-input" type="number" id="h" value="0" min="0" max="23" />
        </div>
        <div class="input-group">
          <label>Minutes</label>
          <input class="time-input" type="number" id="m" value="5" min="0" max="59" />
        </div>
        <div class="input-group">
          <label>Seconds</label>
          <input class="time-input" type="number" id="s" value="0" min="0" max="59" />
        </div>
      </div>
      <div class="color-row">
        <label>Bg Color</label>
        <input type="color" id="bg" value="#0a0a0f" />
      </div>
      <button class="start-btn" onclick="startTimer()">Start</button>
      <div class="err-msg" id="err">Please enter a time greater than zero.</div>
    </div>

    <div class="clock-panel" id="clock">
      <div class="time-display" id="display">00<span class="sep">:</span>05<span class="sep">:</span>00</div>
      <div class="clock-label" id="clk-label">remaining</div>
      <div class="done-text" id="done">Time's Up!</div>
    </div>
  </div>

  <script>
    let total = 0, iv = null, audioCtx = null;

    function pad(n) { return String(n).padStart(2, '0'); }

    function render(t) {
      const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
      document.getElementById('display').innerHTML =
        pad(h) + '<span class="sep">:</span>' +
        pad(m) + '<span class="sep">:</span>' +
        pad(s);
    }

    function startTimer() {
      const hv = parseInt(document.getElementById('h').value) || 0;
      const mv = parseInt(document.getElementById('m').value) || 0;
      const sv = parseInt(document.getElementById('s').value) || 0;
      total = hv * 3600 + mv * 60 + sv;
      const err = document.getElementById('err');
      if (total <= 0) { err.style.display = 'block'; return; }
      err.style.display = 'none';
      document.getElementById('root').style.background = document.getElementById('bg').value;
      document.getElementById('setup').style.display = 'none';
      const clk = document.getElementById('clock');
      clk.style.display = 'flex';
      document.getElementById('done').style.display = 'none';
      document.getElementById('clk-label').style.display = 'block';
      if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      render(total);
      clearInterval(iv);
      iv = setInterval(() => {
        if (total > 0) { total--; render(total); }
        else {
          clearInterval(iv);
          document.getElementById('display').innerHTML =
            '00<span class="sep">:</span>00<span class="sep">:</span>00';
          document.getElementById('clk-label').style.display = 'none';
          document.getElementById('done').style.display = 'block';
          alarm();
        }
      }, 1000);
    }

    function alarm() {
      if (navigator.vibrate) navigator.vibrate([200, 120, 200]);
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      [[880, 0, .28], [880, .45, .28], [880, .9, .45]].forEach(([f, t, d]) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.0001, now + t);
        g.gain.exponentialRampToValueAtTime(0.35, now + t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, now + t + d);
        o.start(now + t); o.stop(now + t + d);
      });
    }
  </script>
</body>
</html>
